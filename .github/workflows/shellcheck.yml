name: shellcheck

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # bash -n + shellcheck against declaroid and every file under tests/.
      # Deliberately doesn't pin LANG/LC_ALL: the sandboxed build's default
      # `C` locale is what caught a real, previously-latent bug (see
      # ROW_SEP's comment in declaroid) -- keeping it unset means any
      # future locale-dependent regression fails here again.
      - run: nix build '.#checks.x86_64-linux.shellcheck' -L
