name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Covers bash -n + shellcheck against declaroid and every test file,
      # actionlint against this workflow, and the whole bats unit suite
      # (tests/unit) -- all wired up as flake `checks`. Deliberately
      # doesn't pin LANG/LC_ALL: the sandboxed build's default `C` locale
      # is what caught a real, previously-latent bug (see ROW_SEP's
      # comment in declaroid) -- keeping it unset means any future
      # locale-dependent regression fails here again.
      - name: nix flake check
        run: nix flake check -L

      - name: nixfmt --check
        run: nix run nixpkgs#nixfmt -- --check flake.nix

      - name: statix check
        run: nix develop --command statix check .

  e2e:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build declaroid and bats
        run: |
          nix build .#declaroid -o result-declaroid
          nix build nixpkgs#bats -o result-bats
          echo "$PWD/result-bats/bin" >> "$GITHUB_PATH"
          echo "DECLAROID_BIN=$PWD/result-declaroid/bin/declaroid" >> "$GITHUB_ENV"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-default-x86_64

      # A separate warm-up run so a cache-miss AVD snapshot (created below)
      # never itself contains any of declaroid's own test side effects.
      - name: Create AVD snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run e2e tests on a booted emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          api-level: 34
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bats tests/e2e
