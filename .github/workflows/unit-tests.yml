name: unit tests

on:
  push:
  pull_request:

jobs:
  bats-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - run: nix build '.#checks.x86_64-linux.bats-unit' -L
